<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Official website of the soccer club — match schedules, tickets, and squad information." />
    <title>FC Kiro — Official Club Website</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#16a34a', // green-600
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen flex flex-col bg-white text-gray-900">

    <!-- Global navigation bar — rendered by js/components/nav.js via main.js -->
    <header id="site-header" class="bg-green-800 text-white">
      <!-- nav.js injects content here -->
    </header>

    <!-- Main content area — hash-based router swaps views here -->
    <main id="app" tabindex="-1" class="flex-1 outline-none">
      <!-- Router renders the active page view into this container -->
    </main>

    <!-- Global footer -->
    <footer class="bg-gray-900 text-gray-300 py-8">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <h2 class="text-white font-semibold text-lg mb-2">FC Kiro</h2>
            <p class="text-sm">The official digital home of FC Kiro. Follow the club for match news, tickets, and squad updates.</p>
          </div>
          <nav aria-label="Footer navigation">
            <h2 class="text-white font-semibold text-lg mb-2">Quick Links</h2>
            <ul role="list" class="space-y-1 text-sm">
              <li><a href="#home" class="hover:text-white focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-green-400 rounded">Home</a></li>
              <li><a href="#schedule" class="hover:text-white focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-green-400 rounded">Match Schedule</a></li>
              <li><a href="#tickets" class="hover:text-white focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-green-400 rounded">Tickets</a></li>
              <li><a href="#squad" class="hover:text-white focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-green-400 rounded">Squad</a></li>
            </ul>
          </nav>
          <div>
            <h2 class="text-white font-semibold text-lg mb-2">Follow Us</h2>
            <p class="text-sm">Stay connected with the latest club news on social media.</p>
          </div>
        </div>
        <p class="mt-8 text-center text-xs text-gray-500">&copy; <span id="footer-year"></span> FC Kiro. All rights reserved.</p>
      </div>
    </footer>

    <script type="module" src="js/main.js"></script>
    <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  </body>
</html>
